<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Black background -->
  <rect width="200" height="200" fill="#0E1117"/>
  
  <!-- Circular outer ring -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#00D9FF" stroke-width="3"/>
  
  <!-- Inner circle -->
  <circle cx="100" cy="100" r="80" fill="#161B22" stroke="#00D9FF" stroke-width="2"/>
  
  <!-- AI symbol - neural network nodes -->
  <circle cx="70" cy="70" r="8" fill="#00D9FF"/>
  <circle cx="130" cy="70" r="8" fill="#00D9FF"/>
  <circle cx="100" cy="130" r="8" fill="#00D9FF"/>
  <circle cx="100" cy="100" r="6" fill="#00D9FF"/>
  
  <!-- Connecting lines -->
  <line x1="70" y1="70" x2="100" y2="100" stroke="#00D9FF" stroke-width="2" opacity="0.7"/>
  <line x1="130" y1="70" x2="100" y2="100" stroke="#00D9FF" stroke-width="2" opacity="0.7"/>
  <line x1="100" y1="100" x2="100" y2="130" stroke="#00D9FF" stroke-width="2" opacity="0.7"/>
  <line x1="70" y1="70" x2="130" y2="70" stroke="#00D9FF" stroke-width="1" opacity="0.5" stroke-dasharray="5,5"/>
  
  <!-- Rocket/growth arrow -->
  <path d="M 100 45 L 105 60 L 100 65 L 95 60 Z" fill="#00D9FF"/>
  
  <!-- Text -->
  <text x="100" y="160" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#00D9FF" text-anchor="middle">AI Career</text>
</svg>
